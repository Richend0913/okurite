  // ===== BOSS =====

// ============================================================
// STATE
// ============================================================
let currentTarget = 'all';
let currentScene  = 'all';
let shownCount    = 0;
const PAGE_SIZE   = 12;

// ============================================================
// FILTER LOGIC
// ============================================================
function getFiltered() {
  return GIFTS.filter(g => {
    const targetOk = currentTarget === 'all' || g.targets.includes(currentTarget);
    const sceneOk  = currentScene  === 'all' || g.scenes.includes(currentScene);
    return targetOk && sceneOk;
  });
}

function setTarget(btn, val) {
  document.querySelectorAll('[data-target].filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTarget = val;
  shownCount = 0;
  render();
  scrollToGrid();
}

function setSceneFilter(btn, val) {
  document.querySelectorAll('[data-scene].filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentScene = val;
  shownCount = 0;
  render();
  scrollToGrid();
}

function setScene(val) {
  currentScene = val;
  shownCount = 0;
  document.querySelectorAll('[data-scene].filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.scene === val);
  });
  render();
  document.getElementById('filter-bar').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function scrollToGrid() {
  document.getElementById('filter-bar').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// RENDER
// ============================================================
function makeCard(g) {
  const tagLabels = {
    female: '女性向け', male: '男性向け', kids: '子供向け', parents: '両親へ', boss: '上司・同僚へ'
  };
  const sceneLabels = {
    'mothers-day': '母の日', 'fathers-day': '父の日', 'birthday': '誕生日',
    'wedding': '結婚祝い', 'baby': '出産祝い', 'christmas': 'クリスマス',
    'school': '入学祝い', 'summer': 'お中元'
  };
  const tags = g.targets.map(t => `<span class="tag">${tagLabels[t]||t}</span>`).join('');
  const thumb = g.img
    ? `<a href="${g.rakutenUrl}" target="_blank" rel="noopener" class="gift-image-link"><img src="${g.img}" alt="${g.name}" loading="lazy" class="gift-img" onerror="this.closest('.gift-image-link').innerHTML='<div class=\\'emoji-thumb\\'>${g.emoji}</div>'"></a>`
    : `<a href="${g.rakutenUrl}" target="_blank" rel="noopener" class="gift-image-link"><div class="emoji-thumb">${g.emoji}</div></a>`;
  const amazonUrl = g.amazonUrl || `https://www.amazon.co.jp/s?k=${encodeURIComponent(g.name)}&tag=okuritegift-22`;
  const rakutenUrl = g.rakutenUrl || `https://search.rakuten.co.jp/search/mall/${encodeURIComponent(g.name)}/`;
  return `
    <div class="gift-card">
      ${thumb}
      <div class="gift-body">
        <h3>${g.name}</h3>
        <p class="price">${g.price}</p>
        <p class="description">${g.desc}</p>
        <div class="tag-row">${tags}</div>
        <div class="affiliate-links">
          <a href="${amazonUrl}" target="_blank" rel="noopener" class="btn-amazon">Amazonで見る</a>
          <a href="${rakutenUrl}" target="_blank" rel="noopener" class="btn-rakuten">楽天で見る</a>
        </div>
      </div>
    </div>`;
}

function render() {
  const filtered = getFiltered();
  const grid     = document.getElementById('gift-grid');
  const countEl  = document.getElementById('result-count');
  const loadWrap = document.getElementById('load-more-wrap');
  const emptyMsg = document.getElementById('empty-msg');

  countEl.innerHTML = `<strong>${filtered.length}</strong> 件のギフトが見つかりました`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    emptyMsg.style.display = 'block';
    loadWrap.style.display = 'none';
    return;
  }

  emptyMsg.style.display = 'none';
  shownCount = Math.min(shownCount + PAGE_SIZE, filtered.length);

  const visible = filtered.slice(0, shownCount);
  grid.innerHTML = visible.map(makeCard).join('');

  if (shownCount < filtered.length) {
    loadWrap.style.display = 'block';
    document.getElementById('btn-load-more').textContent = `もっと見る（残り ${filtered.length - shownCount} 件）`;
  } else {
    loadWrap.style.display = 'none';
  }
}

function loadMore() {
  const filtered = getFiltered();
  const grid = document.getElementById('gift-grid');
  const next = filtered.slice(shownCount, shownCount + PAGE_SIZE);
  next.forEach(g => { grid.insertAdjacentHTML('beforeend', makeCard(g)); });
  shownCount = Math.min(shownCount + PAGE_SIZE, filtered.length);
  const loadWrap = document.getElementById('load-more-wrap');
  if (shownCount >= filtered.length) {
    loadWrap.style.display = 'none';
  } else {
    document.getElementById('btn-load-more').textContent = `もっと見る（残り ${filtered.length - shownCount} 件）`;
  }
}

// ============================================================
// NAV
// ============================================================
function toggleNav() {
  const nav = document.getElementById('header-nav');
  const btn = document.getElementById('hamburger');
  nav.classList.toggle('open');
  btn.classList.toggle('open');
}
function closeNav() {
  document.getElementById('header-nav').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
}

// ============================================================
// INIT
// ============================================================
render();
</script>
