    :root {
      --pink: #f472b6;
      --coral: #fb7185;
      --rose: #e11d48;
      --light: #fff1f2;
      --text: #1f1f2e;
      --muted: #6b7280;
      --border: #fce7f3;
      --grad: linear-gradient(135deg, #f9a8d4 0%, #fb7185 50%, #f472b6 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; color: var(--text); background: #fdf2f8; line-height: 1.7; }

    /* ===== HEADER ===== */
    .header {
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; padding: 0 20px;
    }
    .logo {
      font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.4rem;
      background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .header-nav {
      display: flex; gap: 16px; list-style: none;
    }
    .header-nav a {
      text-decoration: none; color: var(--muted); font-size: .82rem; font-weight: 500;
      transition: color .2s; white-space: nowrap;
    }
    .header-nav a:hover { color: var(--rose); }
    .hamburger {
      display: none; flex-direction: column; justify-content: space-between;
      width: 24px; height: 18px; background: none; border: none; cursor: pointer; padding: 0;
    }
    .hamburger span {
      display: block; height: 2px; background: var(--text);
      transition: all .3s; transform-origin: center;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .header-nav {
        display: none; position: absolute; top: 60px; left: 0; right: 0;
        background: #fff; flex-direction: column; gap: 0;
        border-bottom: 1px solid var(--border);
        box-shadow: 0 4px 12px rgba(0,0,0,.08);
      }
      .header-nav.open { display: flex; }
      .header-nav a { padding: 14px 20px; border-top: 1px solid var(--border); font-size: .9rem; }
    }

    /* ===== HERO ===== */
    .hero {
      background: var(--grad);
      padding: 48px 20px 40px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Ccircle cx='30' cy='30' r='20' fill='%23ffffff' fill-opacity='0.06'/%3E%3C/g%3E%3C/svg%3E") repeat;
    }
    .hero-content { position: relative; z-index: 1; }
    .hero h1 { font-size: 2.4rem; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 12px; }
    .hero-sub { color: rgba(255,255,255,.9); font-size: 1.05rem; }
    .sp-only { display: none; }
    @media (max-width: 768px) {
      .hero { padding: 36px 20px 32px; }
      .hero h1 { font-size: 1.75rem; }
      .hero-sub { font-size: .95rem; }
      .sp-only { display: inline; }
    }

    /* ===== FILTER BAR ===== */
    .filter-bar {
      position: sticky; top: 60px; z-index: 90;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 12px 20px 8px;
    }
    .filter-inner { max-width: 1100px; margin: 0 auto; }
    .filter-row {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      margin-bottom: 8px;
    }
    .filter-label {
      font-size: .75rem; font-weight: 700; color: var(--muted);
      min-width: 36px; flex-shrink: 0;
    }
    .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; }
    .filter-btn {
      background: #f9fafb; border: 1px solid #e5e7eb; color: var(--muted);
      padding: 5px 12px; border-radius: 20px; font-size: .8rem; font-weight: 500;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--pink); color: var(--rose); }
    .filter-btn.active { background: var(--grad); border-color: transparent; color: #fff; }
    .filter-fab{display:none;position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#ff6b9d,#c471ed);color:#fff;border:none;border-radius:50px;padding:14px 24px;font-size:.95rem;font-weight:bold;box-shadow:0 4px 15px rgba(255,107,157,.4);z-index:100;cursor:pointer}
    .filter-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
    .filter-overlay.active{display:block}
    .filter-modal{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;box-shadow:0 -4px 20px rgba(0,0,0,.15);z-index:200;max-height:70vh;overflow-y:auto}
    .filter-modal.active{display:block}
    .filter-modal .filter-row{margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .filter-modal .filter-label{font-weight:bold;min-width:50px;font-size:.85rem}
    .filter-modal .fbtn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:.8rem}
    .filter-modal .fbtn.active{background:#ff6b9d;color:#fff;border-color:#ff6b9d}
    .filter-apply-btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b9d,#c471ed);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:bold;margin-top:12px;cursor:pointer}
    @media(max-width:768px){.filter-bar{position:static!important}.filter-fab{display:flex;align-items:center;gap:6px}}
    .result-count {
      font-size: .8rem; color: var(--muted); margin-top: 4px; margin-bottom: 0;
    }

    /* ===== MAIN / GRID ===== */
    .container {
      max-width: 1100px; margin: 0 auto;
      padding: 24px 20px 48px;
    }
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    @media (max-width: 768px) {
      .gift-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }
    @media (max-width: 480px) {
      .gift-grid { grid-template-columns: 1fr; gap: 12px; }
    }

    /* ===== CARD ===== */
    .gift-card {
      display: flex; flex-direction: column;
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden; transition: transform .2s, box-shadow .2s;
    }
    .gift-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .gift-img-link { display: block; overflow: hidden; }
    .gift-img {
      width: 100%; height: 190px; object-fit: cover; display: block;
      transition: transform .3s;
    }
    .gift-img-link:hover .gift-img { transform: scale(1.04); }
    .gift-body {
      display: flex; flex-direction: column; flex: 1;
      padding: 14px 14px 14px;
    }
    .gift-scene {
      font-size: .7rem; color: var(--rose); font-weight: 700;
      margin-bottom: 4px; display: block;
    }
    .gift-title {
      font-size: .9rem; font-weight: 700; line-height: 1.4;
      margin-bottom: 6px; color: var(--text);
    }
    .price {
      font-size: 1rem; color: var(--rose); font-weight: 700; margin-bottom: 6px;
    }
    .desc {
      font-size: .78rem; color: var(--muted); line-height: 1.5;
      margin-bottom: 8px; flex-grow: 1;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .tag {
      background: var(--light); color: var(--rose);
      font-size: .68rem; padding: 2px 8px; border-radius: 10px; font-weight: 500;
    }
    .affiliate-links { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }
    .btn-amazon, .btn-rakuten {
      display: block; text-align: center; text-decoration: none;
      padding: 8px 12px; border-radius: 6px; font-size: .8rem; font-weight: 700;
      transition: opacity .15s;
    }
    .btn-amazon { background: #ff9900; color: #fff; }
    .btn-rakuten { background: #bf0000; color: #fff; }
    .btn-amazon:hover, .btn-rakuten:hover { opacity: .85; }

    /* ===== LOAD MORE ===== */
    .load-more-wrap { text-align: center; margin-top: 32px; }
    .load-more-btn {
      background: var(--grad); color: #fff; border: none;
      padding: 14px 40px; border-radius: 30px; font-size: .95rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .2s;
    }
    .load-more-btn:hover { opacity: .88; transform: translateY(-2px); }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 1rem;
    }

    /* ===== AD SLOT ===== */
    .ad-slot { max-width: 1100px; margin: 0 auto 24px; padding: 0 20px; }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--text); color: rgba(255,255,255,.7);
      text-align: center; padding: 28px 20px; font-size: .85rem;
    }
    .footer a { color: var(--pink); text-decoration: none; }
  </style>
</head>

    let currentScene = 'all';
    let currentTarget = 'all';
    let currentBudget = 'all';
    let displayCount = 12;

    function getFiltered() {
      return GIFTS.filter(g => {
        const sceneOk = currentScene === 'all' || g.scene === currentScene;
        const targetOk = currentTarget === 'all' || g.targets.includes(currentTarget);
        const budgetOk = currentBudget === 'all' || g.budget === currentBudget;
        return sceneOk && targetOk && budgetOk;
      });
    }

    function renderGrid() {
      const filtered = getFiltered();
      const visible = filtered.slice(0, displayCount);
      const grid = document.getElementById('gift-grid');

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state">該当するギフトが見つかりませんでした。<br>フィルターを変えてお試しください。</div>';
        document.getElementById('load-more-wrap').style.display = 'none';
        document.getElementById('result-count').textContent = '0件のギフトが見つかりました';
        return;
      }

      grid.innerHTML = visible.map(g => `
        <div class="gift-card">
          <a href="${g.rakuten}" target="_blank" rel="noopener" class="gift-img-link">
            <img src="${g.img}" alt="${g.title}" loading="lazy" class="gift-img">
          </a>
          <div class="gift-body">
            <span class="gift-scene">${SCENE_LABELS[g.scene]}</span>
            <h3 class="gift-title">${g.title}</h3>
            <p class="price">${g.price}</p>
            <p class="desc">${g.desc}</p>
            <div class="tag-row">${g.targets.map(t => `<span class="tag">${TARGET_LABELS[t]}</span>`).join('')}</div>
            <div class="affiliate-links">
              <a href="${g.amazon}" target="_blank" rel="noopener" class="btn-amazon">Amazonで見る</a>
              <a href="${g.rakuten}" target="_blank" rel="noopener" class="btn-rakuten">楽天で見る</a>
            </div>
          </div>
        </div>
      `).join('');

      const remaining = filtered.length - displayCount;
      const wrap = document.getElementById('load-more-wrap');
      if (remaining > 0) {
        document.getElementById('remaining-count').textContent = remaining;
        wrap.style.display = 'block';
      } else {
        wrap.style.display = 'none';
      }

      document.getElementById('result-count').textContent = `${filtered.length}件のギフトが見つかりました`;
    }

    function setScene(val) {
      currentScene = val;
      displayCount = 12;
      document.querySelectorAll('#scene-btns .filter-btn').forEach(b => b.classList.remove('active'));
      const idx = ['all','haha','chichi','tanjobi','kekkon','shussan','christmas','nyugaku','ochugen'].indexOf(val);
      if (idx >= 0) document.querySelectorAll('#scene-btns .filter-btn')[idx].classList.add('active');
      renderGrid();
    }

    function setTarget(val) {
      currentTarget = val;
      displayCount = 12;
      document.querySelectorAll('#target-btns .filter-btn').forEach(b => b.classList.remove('active'));
      const idx = ['all','female','male','child','parents','boss'].indexOf(val);
      if (idx >= 0) document.querySelectorAll('#target-btns .filter-btn')[idx].classList.add('active');
      renderGrid();
    }

    function setBudget(val) {
      currentBudget = val;
      displayCount = 12;
      document.querySelectorAll('#budget-btns .filter-btn').forEach(b => b.classList.remove('active'));
      const idx = ['all','under3k','3k5k','5k10k','over10k'].indexOf(val);
      if (idx >= 0) document.querySelectorAll('#budget-btns .filter-btn')[idx].classList.add('active');
      renderGrid();
    }

    function loadMore() {
      displayCount += 12;
      renderGrid();
    }

    function toggleNav() {
      document.getElementById('header-nav').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }

    function closeNav() {
      document.getElementById('header-nav').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
    }

    renderGrid();

    // FAB modal helpers
    function openFilterModal() {
      document.getElementById('filter-overlay').classList.add('active');
      document.getElementById('filter-modal').classList.add('active');
      syncModalBtns();
    }
    function closeFilterModal() {
      document.getElementById('filter-overlay').classList.remove('active');
      document.getElementById('filter-modal').classList.remove('active');
    }
    function syncModalBtns() {
      document.querySelectorAll('#filter-modal .fbtn[data-scene]').forEach(b => {
        b.classList.toggle('active', b.dataset.scene === currentScene);
      });
      document.querySelectorAll('#filter-modal .fbtn[data-target]').forEach(b => {
        b.classList.toggle('active', b.dataset.target === currentTarget);
      });
      document.querySelectorAll('#filter-modal .fbtn[data-budget]').forEach(b => {
        b.classList.toggle('active', b.dataset.budget === currentBudget);
      });
    }
    function modalSetScene(val) { currentScene = val; syncModalBtns(); }
    function modalSetTarget(val) { currentTarget = val; syncModalBtns(); }
    function modalSetBudget(val) { currentBudget = val; syncModalBtns(); }
    function applyModalFilter() {
      renderGrid();
      closeFilterModal();
    }
  </script>

  <div class="filter-modal" id="filter-modal">

      <button class="fbtn" data-budget="over10k" onclick="modalSetBudget('over10k')">10,000円〜</button>
    </div>
    <button class="filter-apply-btn" onclick="applyModalFilter()">この条件で絞り込む</button>
  </div>
  <button class="filter-fab" onclick="openFilterModal()">🔍 絞り込む</button>
